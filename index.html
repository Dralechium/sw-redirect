<!DOCTYPE html>
<html>
<head>
  <title>Choose a Link</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    a {
      display: block;
      width: 220px;
      margin: 20px auto;
      padding: 15px;
      background: #5865F2;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 20px;
    }

    a:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>

<h1>Choose One</h1>

<a href="https://google.com">Link One</a>
<a href="https://youtube.com">Link Two</a>

</body>
</html>
